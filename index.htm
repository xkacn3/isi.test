<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Index závažnosti nespavosti (ISI)</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #18453e;
    color: #e6f4f1;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: #267a6a;
    padding: 25px;
    border-radius: 12px;
}

h1 {
    text-align: center;
    color: #27c499;
}

p {
    margin-bottom: 20px;
}

.intro-space {
    margin-bottom: 30px; /* väčšia medzera po poslednom odseku */
}

.separator {
    border: 0;                 /* odstráni default hranicu */
    height: 2px;               /* hrúbka čiary */
    background: #27c499;       /* farba čiary */
    margin: 30px 0;            /* medzera nad a pod čiarou */
    border-radius: 5px;        /* jemné zaoblenie */
}

.footer-note {
    position: fixed;
    bottom: 10px;
    left: 15px;
    font-size: 8px;
    color: #bcded7;
    opacity: 0.5;
}

.question {
    margin-bottom: 45px;
}

.likert {
    list-style: none;
    display: flex;
    justify-content: space-between;
    padding: 0;
    margin-top: 10px;
}

.likert li {
    text-align: center;
    flex: 1;
}

.likert input {
    transform: scale(1.2);
    cursor: pointer;
}

.scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top: 5px;
    opacity: 0.8;
}

button {
    background: #29AB87;
    color: white;
    border: none;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #239b78;
}

.result {
    margin-top: 25px;
    padding: 20px;
    background: #123d36;
    border-radius: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="container">
<h1>Index závažnosti nespavosti (ISI)</h1>

<p><strong>Pre každú otázku</strong> vyberte číslo, ktoré najlepšie zodpovedá Vašim problémom so spánkom za <strong>POSLEDNÝ MESIAC</strong>.</p>

<p class="intro-space">Pri prvých troch otázkach hodnotíte <strong>ZÁVAŽNOSŤ problémov</strong>.</p>

<hr class="separator">

<form id="isiForm"></form>

<button onclick="calculate()">Zobraziť výsledok</button>

<div class="result" id="result"></div>
</div>

<script>

const questions = [
"1. Ťažkosti so zaspávaním",
"2. Ťažkosti s udržaním spánku",
"3. Príliš skoré ranné budenie",
"4. Ako spokojný/á ste so svojím súčasným spánkovým režimom?",
"5. Do akej miery Váš problém so spánkom ovplyvňuje Váš denný život (únava, koncentrácia, nálada, pamäť)?",
"6. Do akej miery si podľa Vás ostatní všímajú Váš problém so spánkom?",
"7. Ako veľmi vás trápi/znepokojuje váš súčasný problém so spánkom?"
];

const labels = [
["Vôbec","Mierne","Stredne","Výrazne","Veľmi výrazne"],
["Vôbec","Mierne","Stredne","Výrazne","Veľmi výrazne"],
["Vôbec","Mierne","Stredne","Výrazne","Veľmi výrazne"],
["Veľmi spokojný/á","Spokojný/á","Neutrálny/á","Nespokojný/á","Veľmi nespokojný/á"],
["Vôbec","Trochu","Stredne","Veľmi","Extrémne"],
["Vôbec","Trochu","Stredne","Veľmi","Extrémne"],
["Vôbec","Trochu","Stredne","Veľmi","Extrémne"]
];

const form = document.getElementById("isiForm");

questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";

let scale = '<ul class="likert">';
for (let j = 0; j < 5; j++) {
    scale += `
        <li>
            <div style="font-size:12px; margin-bottom:5px;">
                ${labels[i][j]}
            </div>
            <input type="radio" name="q${i}" value="${j}">
        </li>
    `;
}
scale += '</ul>';

    div.innerHTML = `
        <label>${q}</label>
        ${scale}
    `;

    form.appendChild(div);
});

function calculate() {
    let total = 0;

    for (let i = 0; i < 7; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        if (!checked) {
            alert("Prosím, odpovedzte na všetky otázky.");
            return;
        }
        total += parseInt(checked.value);
    }

    let resultText = "";

    if (total <= 7) {
        resultText = "Bez klinicky významnej nespavosti";
    } else if (total <= 14) {
        resultText = "Subklinická (mierna) nespavosť";
    } else if (total <= 21) {
        resultText = "Klinická nespavosť (stredná)";
    } else {
        resultText = "Klinická nespavosť (závažná)";
    }

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML = `
        <h2>Vaše skóre: ${total} / 28</h2>
        <p><strong>${resultText}</strong></p>
    `;
}

</script>

</body>

<div class="footer-note">
© Morin, C.M. (1993, 1996, 2000, 2006).
</div>
</html>
