<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Index závažnosti nespavosti (ISI)</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #18453e;
    color: #e6f4f1;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: #267a6a;
    padding: 25px;
    border-radius: 12px;
}

h1 {
    text-align: center;
    color: #27c499;
}

p {
    margin-bottom: 20px;
}

.intro-space {
    margin-bottom: 30px;
}

.separator {
    border: 0;
    height: 2px;
    background: #27c499;
    margin: 30px 0;
    border-radius: 5px;
}

.footer-note {
    position: fixed;
    bottom: 10px;
    left: 15px;
    font-size: 8px;
    color: #bcded7;
    opacity: 0.5;
}

.question {
    margin-bottom: 45px;
}

.likert {
    list-style: none;
    display: flex;
    justify-content: space-between;
    padding: 0;
    margin-top: 10px;
}

.likert li {
    text-align: center;
    flex: 1;
}

.likert input {
    transform: scale(1.2);
    cursor: pointer;
}

button {
    background: #29AB87;
    color: white;
    border: none;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #239b78;
}

button:disabled {
    background: #1a6e55;
    cursor: not-allowed;
    opacity: 0.7;
}

.result {
    margin-top: 25px;
    padding: 20px;
    background: #123d36;
    border-radius: 10px;
    display: none;
}

.save-status {
    margin-top: 15px;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
}

.save-status.saving {
    background: #1a5c4e;
    color: #7ecdba;
    display: block;
}

.save-status.success {
    background: #1a4a2e;
    color: #5ddc8c;
    display: block;
}

.save-status.error {
    background: #4a1a1a;
    color: #dc5d5d;
    display: block;
}
</style>
</head>

<body>

<div class="container">
    <h1>Index závažnosti nespavosti (ISI)</h1>

    <p><strong>Pre každú otázku</strong> vyberte číslo, ktoré najlepšie zodpovedá Vašim problémom so spánkom za <strong>POSLEDNÝ MESIAC</strong>.</p>

    <p class="intro-space">Pri prvých troch otázkach hodnotíte <strong>ZÁVAŽNOSŤ problémov</strong>.</p>

    <hr class="separator">

    <form id="isiForm"></form>

    <button id="submitBtn" onclick="calculate()">Zobraziť výsledok</button>

    <div class="save-status" id="saveStatus"></div>

    <div class="result" id="result"></div>
</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyanS67G8Ekdh_LK_lv6B_EnqBt6OGwzVetk5Adcs37gq2zEa8vidpvOV0pLczp1TVz/exec";

const questions = [
    "1. Ťažkosti so zaspávaním",
    "2. Ťažkosti s udržaním spánku",
    "3. Príliš skoré ranné budenie",
    "4. Ako spokojný/á ste so svojím súčasným spánkovým režimom?",
    "5. Do akej miery Váš problém so spánkom ovplyvňuje Váš denný život (únava, koncentrácia, nálada, pamäť)?",
    "6. Do akej miery si podľa Vás ostatní všímajú Váš problém so spánkom?",
    "7. Ako veľmi vás trápi/znepokojuje váš súčasný problém so spánkom?"
];

const labels = [
    ["Vôbec","Mierne","Stredne","Výrazne","Veľmi výrazne"],
    ["Vôbec","Mierne","Stredne","Výrazne","Veľmi výrazne"],
    ["Vôbec","Mierne","Stredne","Výrazne","Veľmi výrazne"],
    ["Veľmi spokojný/á","Spokojný/á","Neutrálny/á","Nespokojný/á","Veľmi nespokojný/á"],
    ["Vôbec","Trochu","Stredne","Veľmi","Extrémne"],
    ["Vôbec","Trochu","Stredne","Veľmi","Extrémne"],
    ["Vôbec","Trochu","Stredne","Veľmi","Extrémne"]
];

// Build form questions dynamically
const form = document.getElementById("isiForm");

questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";

    let scale = '<ul class="likert">';
    for (let j = 0; j < 5; j++) {
        scale += `
            <li>
                <div style="font-size:12px; margin-bottom:5px;">${labels[i][j]}</div>
                <input type="radio" name="q${i}" value="${j}">
            </li>
        `;
    }
    scale += '</ul>';

    div.innerHTML = `<label>${q}</label>${scale}`;
    form.appendChild(div);
});

// ─── SAVE TO GOOGLE SHEETS ───────────────────────────────────────────────────

async function saveToSheets(submission) {
    const statusEl = document.getElementById("saveStatus");
    statusEl.className = "save-status saving";
    statusEl.textContent = "⏳ Ukladám výsledky...";

    try {
        // Use FormData so Apps Script receives it via e.parameter.payload
        const formData = new FormData();
        formData.append("payload", JSON.stringify(submission));

        await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",   // required for cross-origin to Apps Script
            body: formData
        });

        // With no-cors we can't read the response, but no exception = delivered
        statusEl.className = "save-status success";
        statusEl.textContent = "✅ Výsledky boli úspešne uložené.";
    } catch (err) {
        console.error(err);
        statusEl.className = "save-status error";
        statusEl.textContent = `❌ Chyba pri ukladaní: ${err.message}`;
    }
}

// ─── CALCULATE & SUBMIT ──────────────────────────────────────────────────────

async function calculate() {
    let total = 0;
    const answers = [];

    for (let i = 0; i < 7; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        if (!checked) {
            alert("Prosím, odpovedzte na všetky otázky.");
            return;
        }
        const val = parseInt(checked.value);
        total += val;
        answers.push({
            question: questions[i],
            answer_index: val,
            answer_label: labels[i][val]
        });
    }

    let resultText = "";
    if      (total <= 7)  resultText = "Bez klinicky významnej nespavosti";
    else if (total <= 14) resultText = "Subklinická (mierna) nespavosť";
    else if (total <= 21) resultText = "Klinická nespavosť (stredná)";
    else                  resultText = "Klinická nespavosť (závažná)";

    // Show result to user
    const resultEl = document.getElementById("result");
    resultEl.style.display = "block";
    resultEl.innerHTML = `
        <h2>Vaše skóre: ${total} / 28</h2>
        <p><strong>${resultText}</strong></p>
    `;

    // Disable button to prevent double-submit
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;

    // Build submission object
    const submission = {
        timestamp: new Date().toISOString(),
        score: total,
        category: resultText,
        answers: answers
    };

    await saveToSheets(submission);

    btn.disabled = false;
}

</script>

</body>

<div class="footer-note">
    © Morin, C.M. (1993, 1996, 2000, 2006).
</div>
</html>
